app: "demo-dashboard"

frontend:
  design:
    colors:
      mode: "any"
    fonts:
      allowed: ["Inter", "Inter Tight", "system-ui", "monospace"]
    spacing:
      scale: [0, 4, 8, 12, 16, 24, 32, 48, 64]
  structure:
    required_sections: ["header", "main-content", "footer"]
    locked_sections: []
    section_order :
      first: "header"
      last: "footer"
  accessibility:
    wcag_level: "AA"
    color_contrast: ">= 4.5"
    all_images: "must have alt text"
  pages:
    "/":
      level: 4
      required: ["sidebar", "header"]
