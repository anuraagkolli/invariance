# Invariance Config — generated by invariance-scan
# All sections locked to observed values. To unlock customization:
#   npx invariance-unlock --status              # see what's locked
#   npx invariance-unlock colors                # allow any colors
#   npx invariance-unlock fonts                 # allow any fonts
#   npx invariance-unlock layout                # allow layout changes
#   npx invariance-unlock page / --level 2      # set page level
#   npx invariance-unlock all                   # unlock everything
# Or edit this file directly — the config is the source of truth.

app: "@invariance/demo"
frontend:
  design:
    colors:
      mode: palette
      palette:
        - "#111827"
        - "#1F2937"
        - "#4B5563"
        - "#4F46E5"
        - "#6366F1"
        - "#6B7280"
        - "#9CA3AF"
        - "#D1D5DB"
        - "#E5E7EB"
        - "#EF4444"
        - "#F3F4F6"
        - "#F9FAFB"
        - "#FFFFFF"
    fonts:
      allowed:
        - >-
          ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color
          Emoji"
    spacing:
      scale:
        - 6
        - 8
        - 12
        - 16
        - 20
        - 24
        - 36
  structure:
    required_sections:
      - section-1
      - section-2
      - section-3
      - section-4
      - section-5
      - section-6
    locked_sections:
      - section-1
      - section-2
      - section-3
      - section-4
      - section-5
      - section-6
    section_order:
      first: section-1
      last: section-6
  accessibility:
    wcag_level: AA
    color_contrast: ">= 4.5"
    all_images: must have alt text
  pages:
    /:
      level: 0
      required:
        - section-1
        - section-2
        - section-3
        - section-4
        - section-5
        - section-6
