app: "@invariance/demo"
frontend:
  design:
    colors:
      mode: palette
      palette:
        - "#111827"
        - "#1F2937"
        - "#4B5563"
        - "#4F46E5"
        - "#6366F1"
        - "#6B7280"
        - "#9CA3AF"
        - "#D1D5DB"
        - "#E5E7EB"
        - "#EF4444"
        - "#F3F4F6"
        - "#F9FAFB"
        - "#FFFFFF"
    fonts:
      allowed:
        - >-
          ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color
          Emoji"
    spacing:
      scale:
        - 6
        - 8
        - 12
        - 16
        - 20
        - 24
        - 36
  structure:
    required_sections:
      - footer
      - header
      - main
      - main-container
      - nav
      - sidebar
    locked_sections:
      - footer
      - header
      - main
      - main-container
      - nav
      - sidebar
    section_order:
      first: sidebar
      last: footer
  accessibility:
    wcag_level: AA
    color_contrast: ">= 4.5"
    all_images: must have alt text
  pages:
    /:
      level: 0
      required:
        - sidebar
        - main-container
        - nav
        - header
        - main
        - footer
